# lull.jtr-lab.com
# Copy to /etc/nginx/sites-available/lull, then:
#   sudo ln -s /etc/nginx/sites-available/lull /etc/nginx/sites-enabled/ll-lull
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL: uses existing wildcard self-signed cert for *.jtr-lab.com.
# To get a proper Let's Encrypt cert:
#   sudo certbot certonly --manual --preferred-challenges dns -d lull.jtr-lab.com

server {
    listen 80;
    listen [::]:80;
    server_name lull.jtr-lab.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lull.jtr-lab.com;

    ssl_certificate /etc/nginx/ssl/wildcard.jtr-lab.com.crt;
    ssl_certificate_key /etc/nginx/ssl/wildcard.jtr-lab.com.key;

    root /home/ubuntu/lull;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /robots.txt {
        add_header Content-Type "text/plain; charset=utf-8";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
